name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docker-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Run Docker-based CI checks
        run: make ci
