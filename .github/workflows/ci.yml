name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docker-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Run Docker-based CI checks
        run: make ci

  macos-install-smoke:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GeoQ from formula (HEAD)
        run: brew install --build-from-source --HEAD ./Formula/geoq.rb

      - name: Run installed-binary acceptance smoke
        run: GEOQ_BIN=geoq bash scripts/acceptance/macos_user_journey.sh
